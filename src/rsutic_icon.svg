<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Adjusted radial gradient to properly fit the new thinner wheel body -->
    <radialGradient id="rustGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#a64617" />
      <stop offset="72%" stop-color="#d66e2d" />
      <stop offset="85%" stop-color="#a64617" />
      <stop offset="95%" stop-color="#541e06" />
    </radialGradient>

    <!-- Drop shadow filter for the inner white braces -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5" />
      <feOffset dx="0" dy="3" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.6" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- 
      Outer gear teeth remain exactly the same. 
      The inner circle has been enlarged to 125 to reduce wheel thickness.
    -->
    <path id="gearShape" fill-rule="evenodd" d="
      M -27.8,-198.1 A 200 200 0 0 1 27.8,-198.1 
      L 46.4,-142.7 A 150 150 0 0 1 68.1,-133.7 
      L 120.4,-159.7 A 200 200 0 0 1 159.7,-120.4 
      L 133.7,-68.1 A 150 150 0 0 1 142.7,-46.4 
      L 198.1,-27.8 A 200 200 0 0 1 198.1,27.8 
      L 142.7,46.4 A 150 150 0 0 1 133.7,68.1 
      L 159.7,120.4 A 200 200 0 0 1 120.4,159.7 
      L 68.1,133.7 A 150 150 0 0 1 46.4,142.7 
      L 27.8,198.1 A 200 200 0 0 1 -27.8,198.1 
      L -46.4,142.7 A 150 150 0 0 1 -68.1,133.7 
      L -120.4,159.7 A 200 200 0 0 1 -159.7,120.4 
      L -133.7,68.1 A 150 150 0 0 1 -142.7,46.4 
      L -198.1,27.8 A 200 200 0 0 1 -198.1,-27.8 
      L -142.7,-46.4 A 150 150 0 0 1 -133.7,-68.1 
      L -159.7,-120.4 A 200 200 0 0 1 -120.4,-159.7 
      L -68.1,-133.7 A 150 150 0 0 1 -46.4,-142.7 
      Z
      M 125,0 
      A 125 125 0 1 0 -125,0 
      A 125 125 0 1 0 125,0 
      Z
    " />
  </defs>

  <!-- Group centered in the viewBox -->
  <g transform="translate(250, 250)">
    
    <!-- 1. Base dark brown border (Stroke width slightly reduced to fit thinner wheel) -->
    <use href="#gearShape" stroke="#361202" stroke-width="20" fill="none" />
    
    <!-- 2. Light orange bevel (Stroke width reduced proportionally) -->
    <use href="#gearShape" stroke="#c06129" stroke-width="8" fill="none" />
    
    <!-- 3. Main rusty gear body -->
    <use href="#gearShape" fill="url(#rustGrad)" />

    <!-- 4. Inner white curly braces '{}' with subtle drop shadow -->
    <g filter="url(#shadow)" stroke="#FFFFFF" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Left Brace '{' -->
      <path d="M -22,-75 
               Q -45,-75 -45,-50 
               L -45,-20 
               Q -45,-5 -60,0 
               Q -45,5 -45,20 
               L -45,50 
               Q -45,75 -22,75" />
               
      <!-- Right Brace '}' -->
      <path d="M 22,-75 
               Q 45,-75 45,-50 
               L 45,-20 
               Q 45,-5 60,0 
               Q 45,5 45,20 
               L 45,50 
               Q 45,75 22,75" />
    </g>

  </g>
</svg>