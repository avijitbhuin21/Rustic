[package]
name = "rustic"
version = "0.1.0"
edition = "2021"

[lib]
name = "rustic_lib"
path = "src/lib.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools"] }
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
zip = { version = "2", features = ["deflate"] }
form_urlencoded = "1"
base64 = "0.22"

rustic-core = { path = "../crates/rustic-core" }
rustic-db = { path = "../crates/rustic-db" }
rustic-agent = { path = "../crates/rustic-agent" }
notify = { version = "7", features = ["macos_fsevent"] }
notify-debouncer-full = "0.4"
ignore = "0.4"

rustic-git = { path = "../crates/rustic-git" }
rustic-terminal = { path = "../crates/rustic-terminal" }
