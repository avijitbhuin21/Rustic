name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch — saves CI minutes when pushing
# rapidly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust (cargo check + test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # Tauri 2 build deps on Windows are bundled with the toolchain — nothing
      # extra needed here. On Linux we'd install webkit2gtk + libsoup.

      - name: cargo check (workspace)
        run: cargo check --workspace --locked

      - name: cargo test (workspace, lib)
        run: cargo test --workspace --lib --locked

      # Lint with clippy. Deny-level workspace lints (dbg_macro,
      # await_holding_lock) fail the build; advisory lints (unwrap_used /
      # expect_used are deliberately `warn` in the workspace lint table) stay
      # warnings — RUSTFLAGS is cleared here so the global `-D warnings`
      # doesn't promote them and defeat that policy.
      - name: cargo clippy
        run: cargo clippy --workspace --lib --locked
        env:
          RUSTFLAGS: ""

  server:
    name: Rust (rustic-server, Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # The server crate links no webview, so no webkit2gtk/libsoup needed.
      - name: cargo check (rustic-server)
        run: cargo check -p rustic-server --locked

  fmt:
    name: Rust (cargo fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all --check

  audit:
    name: Rust (cargo audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # Scan Cargo.lock for RustSec advisories (vulns + unmaintained/yanked).
      # Ignored advisories are transitive deps that need a MAJOR version bump
      # of a direct dependency — revisit when upgrading:
      #   RUSTSEC-2026-0187  lopdf 0.38 → ≥0.42 (breaking API; PDF preview)
      #   RUSTSEC-2026-0194  quick-xml < 0.41 (pinned by calamine/docx-rs)
      #   RUSTSEC-2026-0195  quick-xml < 0.41 (same parents)
      - name: cargo audit
        run: >-
          cargo audit
          --ignore RUSTSEC-2026-0187
          --ignore RUSTSEC-2026-0194
          --ignore RUSTSEC-2026-0195

  frontend:
    name: Frontend (bun build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: bun install
        run: bun install --frozen-lockfile

      - name: bun run build
        run: bun run build
