[package]
name = "rustic-agent"
version = "0.2.0"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
async-trait = "0.1"
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "multipart", "rustls-tls"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "io-util", "time", "fs", "process", "net"] }
uuid = { version = "1", features = ["v4"] }
futures = "0.3"
regex = "1"
ignore = "0.4"
glob = "0.3"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde", "std"] }
rustic-db = { path = "../rustic-db" }
similar = "2"
sha2 = "0.10"
hex = "0.4"
tempfile = "3"
thiserror = "1"
tracing = "0.1"
base64 = "0.22"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.58", features = [
    "Win32_Foundation",
    "Win32_System_JobObjects",
    "Win32_System_Threading",
    "Win32_Security",
] }
